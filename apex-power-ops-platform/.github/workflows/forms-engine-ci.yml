name: Forms Engine CI

on:
  push:
    paths:
      - packages/forms-engine/**
      - .github/workflows/forms-engine-ci.yml
  pull_request:
    paths:
      - packages/forms-engine/**
      - .github/workflows/forms-engine-ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/forms-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Syntax compile extracted package
        run: python -m compileall src tests
      - name: Run forms-engine smoke regression test
        run: pytest tests/test_smoke.py -q