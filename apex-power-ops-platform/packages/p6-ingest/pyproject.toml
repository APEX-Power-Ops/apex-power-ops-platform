[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "apex-p6-ingest"
version = "0.1.0"
description = "Bounded p6-ingest runtime contract for Olares canary and MCP proof"
requires-python = ">=3.11"

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
]

[project.scripts]
apex-p6-runtime = "apex_p6_ingest.runtime:main"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
