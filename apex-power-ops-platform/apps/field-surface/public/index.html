<\!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX Field Surface — Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; }
    .status-not_started { background: #e5e7eb; color: #374151; }
    .status-ready { background: #dbeafe; color: #1e40af; }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-on_hold { background: #fef3c7; color: #92400e; }
    .status-complete { background: #c7d2fe; color: #3730a3; }
    .sync-pending { color: #d97706; }
    .sync-synced { color: #059669; }
    .sync-failed { color: #dc2626; }
    .nav-active { background: #015687; color: white; }
    .resa-blue { color: #015687; }
    .resa-bg { background: #015687; }
    .resa-green { color: #5FA844; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ===== CONFIGURATION =====
    const SEAM_BASE = 'http://localhost:8000/api/v1/mutations';
    const DEFAULT_ACTOR = {
      actor_id: 'tech-001',
      actor_role: 'field_tech',
      project_scope: ['proj-001'],
    };

    // ===== AUTH TOKEN =====
    function makeToken(actor) {
      return 'Bearer ' + btoa(JSON.stringify(actor));
    }

    // ===== OFFLINE QUEUE =====
    // In-memory queue simulating IndexedDB/Workbox for prototype
    const offlineQueue = {
      _queue: [],
      _listeners: new Set(),
      enqueue(mutation) {
        const entry = {
          ...mutation,
          queued_at: new Date().toISOString(),
          sync_status: 'pending',
          retry_count: 0,
        };
        this._queue.push(entry);
        this._notify();
        return entry;
      },
      getAll() { return [...this._queue]; },
      getPending() { return this._queue.filter(e => e.sync_status === 'pending'); },
      markSynced(idempotencyKey, response) {
        const entry = this._queue.find(e => e.idempotency_key === idempotencyKey);
        if (entry) {
          entry.sync_status = 'synced';
          entry.server_response = response;
          entry.synced_at = new Date().toISOString();
        }
        this._notify();
      },
      markFailed(idempotencyKey, error) {
        const entry = this._queue.find(e => e.idempotency_key === idempotencyKey);
        if (entry) {
          entry.sync_status = 'failed';
          entry.last_error = error;
          entry.retry_count += 1;
        }
        this._notify();
      },
      subscribe(fn) { this._listeners.add(fn); return () => this._listeners.delete(fn); },
      _notify() { this._listeners.forEach(fn => fn(this.getAll())); },
    };

    // ===== MUTATION CLIENT =====
    async function submitMutation(endpoint, actionType, mutationClass, entityId, payload, reason) {
      const idempotencyKey = crypto.randomUUID();
      const body = {
        idempotency_key: idempotencyKey,
        mutation_class: mutationClass,
        action_type: actionType,
        entity_id: entityId,
        payload: payload,
        reason: reason || null,
        source: navigator.onLine ? 'online' : 'offline_queue',
        client_timestamp: new Date().toISOString(),
      };

      // Always enqueue for tracking
      offlineQueue.enqueue(body);

      if (\!navigator.onLine && mutationClass === 'C') {
        offlineQueue.markFailed(idempotencyKey, 'Class C mutations require online connectivity');
        return { status: 'rejected', error: { code: 'OFFLINE_CLASS_C_REJECTED' } };
      }

      try {
        const resp = await fetch(`${SEAM_BASE}/${endpoint}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': makeToken(DEFAULT_ACTOR),
          },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (data.status === 'accepted' || data.status === 'idempotent_hit') {
          offlineQueue.markSynced(idempotencyKey, data);
        } else {
          offlineQueue.markFailed(idempotencyKey, data.error?.message || 'Rejected');
        }
        return data;
      } catch (err) {
        offlineQueue.markFailed(idempotencyKey, err.message);
        return { status: 'error', error: { code: 'NETWORK_ERROR', message: err.message } };
      }
    }

    // Replay pending queue entries
    async function replayQueue() {
      const pending = offlineQueue.getPending();
      const results = [];
      for (const entry of pending) {
        try {
          const endpoint = guessEndpoint(entry);
          const resp = await fetch(`${SEAM_BASE}/${endpoint}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': makeToken(DEFAULT_ACTOR),
            },
            body: JSON.stringify(entry),
          });
          const data = await resp.json();
          if (data.status === 'accepted' || data.status === 'idempotent_hit') {
            offlineQueue.markSynced(entry.idempotency_key, data);
            results.push({ key: entry.idempotency_key, status: 'synced' });
          } else {
            offlineQueue.markFailed(entry.idempotency_key, data.error?.message);
            results.push({ key: entry.idempotency_key, status: 'failed' });
          }
        } catch (err) {
          offlineQueue.markFailed(entry.idempotency_key, err.message);
          results.push({ key: entry.idempotency_key, status: 'error' });
        }
      }
      return results;
    }

    function guessEndpoint(entry) {
      const actionMap = {
        update_status: 'apparatus', update_assessment: 'apparatus',
        complete_item: 'checklist', update_note: 'checklist',
        log_entry: 'hours',
        create: 'issues', begin_review: 'issues',
      };
      return actionMap[entry.action_type] || 'apparatus';
    }

    // ===== DEMO DATA FETCHER =====
    // Since the seam is write-only, we seed read data client-side matching the MemoryStore
    function getSeedData() {
      return {
        apparatus: [
          { id: 'app-001', task_id: 'task-001', name: 'Main Breaker 480V', neta_standard: 'ATS', status: 'not_started', assigned_to: null },
          { id: 'app-002', task_id: 'task-001', name: 'Distribution Panel', neta_standard: 'MTS', status: 'ready', assigned_to: 'tech-001' },
          { id: 'app-003', task_id: 'task-002', name: 'Cable Assembly A', neta_standard: 'ATS', status: 'active', assigned_to: 'tech-001' },
          { id: 'app-004', task_id: 'task-002', name: 'Cable Assembly B', neta_standard: 'ATS', status: 'not_started', assigned_to: null },
          { id: 'app-005', task_id: 'task-003', name: 'Control Transformer', neta_standard: 'MTS', status: 'not_started', assigned_to: null },
          { id: 'app-006', task_id: 'task-004', name: 'Safety Switch', neta_standard: 'MTS', status: 'ready', assigned_to: null },
        ],
        checklist: {
          'app-001': [
            { id: 'item-001', name: 'Visual inspection', completed: false },
            { id: 'item-002', name: 'Continuity test', completed: false },
          ],
          'app-002': [
            { id: 'item-003', name: 'Visual inspection', completed: false },
            { id: 'item-004', name: 'Continuity test', completed: false },
          ],
          'app-003': [
            { id: 'item-005', name: 'Visual inspection', completed: false },
            { id: 'item-006', name: 'Continuity test', completed: false },
          ],
        },
        tasks: [
          { id: 'task-001', name: 'Ground Testing', workpackage_id: 'wp-001' },
          { id: 'task-002', name: 'Insulation Testing', workpackage_id: 'wp-001' },
          { id: 'task-003', name: 'Arc Flash Analysis', workpackage_id: 'wp-002' },
          { id: 'task-004', name: 'Controls Documentation', workpackage_id: 'wp-002' },
        ],
      };
    }

    // ===== STATUS BADGE =====
    function StatusBadge({ status }) {
      return (
        <span className={`px-2 py-1 rounded text-xs font-semibold status-${status}`}>
          {status.replace(/_/g, ' ')}
        </span>
      );
    }

    // ===== SCREEN 1: ASSIGNMENT QUEUE =====
    function AssignmentQueue({ onSelect, apparatus }) {
      const myApparatus = apparatus.filter(a => a.assigned_to === 'tech-001');
      const grouped = {};
      myApparatus.forEach(a => {
        if (\!grouped[a.task_id]) grouped[a.task_id] = [];
        grouped[a.task_id].push(a);
      });

      return (
        <div className="p-4">
          <h1 className="text-lg font-bold resa-blue mb-4">My Assignments</h1>
          {Object.entries(grouped).map(([taskId, items]) => (
            <div key={taskId} className="mb-4">
              <h2 className="text-sm font-semibold text-gray-500 mb-2">
                {items[0]?.task_id}
              </h2>
              {items.map(a => (
                <div
                  key={a.id}
                  onClick={() => onSelect(a)}
                  className="bg-white rounded-lg shadow-sm p-3 mb-2 flex justify-between items-center cursor-pointer hover:bg-gray-50 active:bg-gray-100"
                >
                  <div>
                    <div className="font-medium text-sm">{a.name}</div>
                    <div className="text-xs text-gray-500">{a.neta_standard} &middot; {a.id}</div>
                  </div>
                  <StatusBadge status={a.status} />
                </div>
              ))}
            </div>
          ))}
          {myApparatus.length === 0 && (
            <div className="text-center text-gray-400 py-8">No assignments yet</div>
          )}
        </div>
      );
    }

    // ===== SCREEN 2: APPARATUS DETAIL =====
    function ApparatusDetail({ apparatus, onBack, onNavigate, onStatusChange }) {
      const [updating, setUpdating] = useState(false);
      const [lastResult, setLastResult] = useState(null);

      const transitions = {
        not_started: ['ready', 'active'],
        ready: ['active', 'not_started'],
        active: ['on_hold', 'complete'],
        on_hold: ['active', 'ready'],
        complete: [],
      };
      const available = transitions[apparatus.status] || [];

      async function handleTransition(newStatus) {
        setUpdating(true);
        const result = await submitMutation(
          'apparatus', 'update_status', 'B',
          apparatus.id, { status: newStatus },
          `Field tech transitioning to ${newStatus}`
        );
        setLastResult(result);
        if (result.status === 'accepted') {
          onStatusChange(apparatus.id, newStatus);
        }
        setUpdating(false);
      }

      return (
        <div className="p-4">
          <button onClick={onBack} className="text-sm resa-blue mb-3 flex items-center">
            ← Back to queue
          </button>
          <div className="bg-white rounded-lg shadow p-4 mb-4">
            <h1 className="text-lg font-bold">{apparatus.name}</h1>
            <div className="text-sm text-gray-500 mt-1">{apparatus.neta_standard} &middot; {apparatus.id}</div>
            <div className="mt-3">
              <StatusBadge status={apparatus.status} />
            </div>
          </div>

          {available.length > 0 && (
            <div className="bg-white rounded-lg shadow p-4 mb-4">
              <h2 className="text-sm font-semibold mb-2">Update Status</h2>
              <div className="flex gap-2 flex-wrap">
                {available.map(s => (
                  <button
                    key={s}
                    onClick={() => handleTransition(s)}
                    disabled={updating}
                    className="px-3 py-2 text-sm rounded resa-bg text-white hover:opacity-90 disabled:opacity-50"
                  >
                    {updating ? '...' : s.replace(/_/g, ' ')}
                  </button>
                ))}
              </div>
              {lastResult && (
                <div className={`mt-2 text-xs ${lastResult.status === 'accepted' ? 'text-green-600' : 'text-red-600'}`}>
                  {lastResult.status === 'accepted' ? 'Status updated successfully' : `Error: ${lastResult.error?.message || lastResult.status}`}
                </div>
              )}
            </div>
          )}

          <div className="grid grid-cols-3 gap-2">
            <button onClick={() => onNavigate('checklist', apparatus)} className="bg-white rounded-lg shadow p-3 text-center">
              <div className="text-2xl">✓</div>
              <div className="text-xs mt-1">Checklist</div>
            </button>
            <button onClick={() => onNavigate('issues', apparatus)} className="bg-white rounded-lg shadow p-3 text-center">
              <div className="text-2xl">⚠</div>
              <div className="text-xs mt-1">Issues</div>
            </button>
            <button onClick={() => onNavigate('hours', apparatus)} className="bg-white rounded-lg shadow p-3 text-center">
              <div className="text-2xl">⏱</div>
              <div className="text-xs mt-1">Hours</div>
            </button>
          </div>
        </div>
      );
    }

    // ===== SCREEN 3: TEST CHECKLIST =====
    function TestChecklist({ apparatus, checklistItems, onBack, onItemToggle }) {
      const [submitting, setSubmitting] = useState(null);

      async function handleToggle(item) {
        setSubmitting(item.id);
        const result = await submitMutation(
          'checklist', 'complete_item', 'A',
          item.id, { completed: \!item.completed },
          null
        );
        if (result.status === 'accepted') {
          onItemToggle(item.id, \!item.completed);
        }
        setSubmitting(null);
      }

      const items = checklistItems || [];
      const completed = items.filter(i => i.completed).length;

      return (
        <div className="p-4">
          <button onClick={onBack} className="text-sm resa-blue mb-3">← Back to {apparatus.name}</button>
          <h1 className="text-lg font-bold mb-1">Test Checklist</h1>
          <div className="text-sm text-gray-500 mb-4">{completed}/{items.length} complete</div>

          <div className="bg-gray-200 rounded-full h-2 mb-4">
            <div
              className="h-2 rounded-full"
              style={{ width: `${items.length ? (completed/items.length)*100 : 0}%`, background: '#5FA844' }}
            />
          </div>

          {items.map(item => (
            <div
              key={item.id}
              onClick={() => handleToggle(item)}
              className={`bg-white rounded-lg shadow-sm p-3 mb-2 flex items-center gap-3 cursor-pointer ${submitting === item.id ? 'opacity-50' : ''}`}
            >
              <div className={`w-6 h-6 rounded border-2 flex items-center justify-center ${item.completed ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300'}`}>
                {item.completed && '✓'}
              </div>
              <div className="flex-1">
                <div className={`text-sm ${item.completed ? 'line-through text-gray-400' : ''}`}>{item.name}</div>
                <div className="text-xs text-gray-400">{item.id}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ===== SCREEN 4: ISSUE REPORTER =====
    function IssueReporter({ apparatus, onBack }) {
      const [title, setTitle] = useState('');
      const [severity, setSeverity] = useState('medium');
      const [description, setDescription] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [result, setResult] = useState(null);
      const [issues, setIssues] = useState([]);

      async function handleSubmit(e) {
        e.preventDefault();
        if (\!title.trim()) return;
        setSubmitting(true);
        const resp = await submitMutation(
          'issues', 'create', 'B', null,
          {
            title: title,
            severity: severity,
            description: description,
            apparatus_id: apparatus.id,
            status: 'open',
            blocks_completion: false,
            reported_by: 'tech-001',
          },
          null
        );
        setResult(resp);
        if (resp.status === 'accepted') {
          setIssues(prev => [...prev, { id: resp.entity_id, title, severity, status: 'open' }]);
          setTitle('');
          setDescription('');
        }
        setSubmitting(false);
      }

      return (
        <div className="p-4">
          <button onClick={onBack} className="text-sm resa-blue mb-3">← Back to {apparatus.name}</button>
          <h1 className="text-lg font-bold mb-4">Report Issue</h1>

          <form onSubmit={handleSubmit} className="bg-white rounded-lg shadow p-4 mb-4">
            <div className="mb-3">
              <label className="block text-xs font-semibold text-gray-500 mb-1">Title</label>
              <input
                value={title}
                onChange={e => setTitle(e.target.value)}
                className="w-full border rounded px-3 py-2 text-sm"
                placeholder="Brief description of the issue"
              />
            </div>
            <div className="mb-3">
              <label className="block text-xs font-semibold text-gray-500 mb-1">Severity</label>
              <select value={severity} onChange={e => setSeverity(e.target.value)} className="w-full border rounded px-3 py-2 text-sm">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div className="mb-3">
              <label className="block text-xs font-semibold text-gray-500 mb-1">Description</label>
              <textarea
                value={description}
                onChange={e => setDescription(e.target.value)}
                className="w-full border rounded px-3 py-2 text-sm"
                rows={3}
                placeholder="Additional details..."
              />
            </div>
            <button
              type="submit"
              disabled={submitting || \!title.trim()}
              className="w-full resa-bg text-white rounded py-2 text-sm font-semibold disabled:opacity-50"
            >
              {submitting ? 'Submitting...' : 'Submit Issue'}
            </button>
            {result && (
              <div className={`mt-2 text-xs ${result.status === 'accepted' ? 'text-green-600' : 'text-red-600'}`}>
                {result.status === 'accepted' ? `Issue created: ${result.entity_id}` : `Error: ${result.error?.message}`}
              </div>
            )}
          </form>

          {issues.length > 0 && (
            <div>
              <h2 className="text-sm font-semibold mb-2">Reported Issues</h2>
              {issues.map(iss => (
                <div key={iss.id} className="bg-white rounded-lg shadow-sm p-3 mb-2">
                  <div className="flex justify-between">
                    <span className="text-sm font-medium">{iss.title}</span>
                    <span className={`text-xs px-2 py-1 rounded ${iss.severity === 'critical' ? 'bg-red-100 text-red-700' : iss.severity === 'high' ? 'bg-orange-100 text-orange-700' : 'bg-yellow-100 text-yellow-700'}`}>
                      {iss.severity}
                    </span>
                  </div>
                  <div className="text-xs text-gray-400 mt-1">{iss.id}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ===== SCREEN 5: HOURS ENTRY =====
    function HoursEntry({ apparatus, onBack }) {
      const [hours, setHours] = useState('');
      const [note, setNote] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [result, setResult] = useState(null);
      const [entries, setEntries] = useState([]);

      async function handleSubmit(e) {
        e.preventDefault();
        if (\!hours || parseFloat(hours) <= 0) return;
        setSubmitting(true);
        const resp = await submitMutation(
          'hours', 'log_entry', 'A', null,
          {
            apparatus_id: apparatus.id,
            task_id: apparatus.task_id,
            project_id: 'proj-001',
            hours: parseFloat(hours),
            note: note,
            work_date: new Date().toISOString().split('T')[0],
            logged_by: 'tech-001',
          },
          null
        );
        setResult(resp);
        if (resp.status === 'accepted') {
          setEntries(prev => [...prev, { id: resp.entity_id, hours: parseFloat(hours), note, date: new Date().toLocaleDateString() }]);
          setHours('');
          setNote('');
        }
        setSubmitting(false);
      }

      const totalHours = entries.reduce((sum, e) => sum + e.hours, 0);

      return (
        <div className="p-4">
          <button onClick={onBack} className="text-sm resa-blue mb-3">← Back to {apparatus.name}</button>
          <h1 className="text-lg font-bold mb-4">Log Hours</h1>

          <form onSubmit={handleSubmit} className="bg-white rounded-lg shadow p-4 mb-4">
            <div className="mb-3">
              <label className="block text-xs font-semibold text-gray-500 mb-1">Hours Worked</label>
              <input
                type="number"
                step="0.25"
                min="0.25"
                max="24"
                value={hours}
                onChange={e => setHours(e.target.value)}
                className="w-full border rounded px-3 py-2 text-sm"
                placeholder="e.g. 2.5"
              />
            </div>
            <div className="mb-3">
              <label className="block text-xs font-semibold text-gray-500 mb-1">Notes</label>
              <input
                value={note}
                onChange={e => setNote(e.target.value)}
                className="w-full border rounded px-3 py-2 text-sm"
                placeholder="What did you work on?"
              />
            </div>
            <button
              type="submit"
              disabled={submitting || \!hours}
              className="w-full resa-bg text-white rounded py-2 text-sm font-semibold disabled:opacity-50"
            >
              {submitting ? 'Logging...' : 'Log Hours'}
            </button>
            {result && (
              <div className={`mt-2 text-xs ${result.status === 'accepted' ? 'text-green-600' : 'text-red-600'}`}>
                {result.status === 'accepted' ? 'Hours logged successfully' : `Error: ${result.error?.message}`}
              </div>
            )}
          </form>

          {entries.length > 0 && (
            <div>
              <div className="flex justify-between items-center mb-2">
                <h2 className="text-sm font-semibold">Today's Entries</h2>
                <span className="text-sm font-bold resa-green">{totalHours}h total</span>
              </div>
              {entries.map(e => (
                <div key={e.id} className="bg-white rounded-lg shadow-sm p-3 mb-2 flex justify-between">
                  <div>
                    <div className="text-sm">{e.note || 'No note'}</div>
                    <div className="text-xs text-gray-400">{e.date}</div>
                  </div>
                  <div className="text-sm font-semibold">{e.hours}h</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ===== SCREEN 6: SYNC STATUS =====
    function SyncStatus() {
      const [queue, setQueue] = useState(offlineQueue.getAll());
      const [replaying, setReplaying] = useState(false);
      const [online, setOnline] = useState(navigator.onLine);

      useEffect(() => {
        const unsub = offlineQueue.subscribe(setQueue);
        const onOnline = () => setOnline(true);
        const onOffline = () => setOnline(false);
        window.addEventListener('online', onOnline);
        window.addEventListener('offline', onOffline);
        return () => { unsub(); window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
      }, []);

      async function handleReplay() {
        setReplaying(true);
        await replayQueue();
        setReplaying(false);
      }

      const pending = queue.filter(e => e.sync_status === 'pending').length;
      const synced = queue.filter(e => e.sync_status === 'synced').length;
      const failed = queue.filter(e => e.sync_status === 'failed').length;

      return (
        <div className="p-4">
          <h1 className="text-lg font-bold mb-4">Sync Status</h1>

          <div className="bg-white rounded-lg shadow p-4 mb-4">
            <div className="flex items-center gap-2 mb-3">
              <div className={`w-3 h-3 rounded-full ${online ? 'bg-green-500' : 'bg-red-500'}`} />
              <span className="text-sm font-medium">{online ? 'Online' : 'Offline'}</span>
            </div>
            <div className="grid grid-cols-3 gap-2 text-center">
              <div>
                <div className="text-2xl font-bold sync-pending">{pending}</div>
                <div className="text-xs text-gray-500">Pending</div>
              </div>
              <div>
                <div className="text-2xl font-bold sync-synced">{synced}</div>
                <div className="text-xs text-gray-500">Synced</div>
              </div>
              <div>
                <div className="text-2xl font-bold sync-failed">{failed}</div>
                <div className="text-xs text-gray-500">Failed</div>
              </div>
            </div>
          </div>

          {pending > 0 && (
            <button
              onClick={handleReplay}
              disabled={replaying || \!online}
              className="w-full resa-bg text-white rounded py-2 text-sm font-semibold mb-4 disabled:opacity-50"
            >
              {replaying ? 'Replaying...' : `Replay ${pending} pending mutations`}
            </button>
          )}

          <div>
            <h2 className="text-sm font-semibold mb-2">Mutation Log ({queue.length})</h2>
            {[...queue].reverse().map((entry, i) => (
              <div key={i} className="bg-white rounded-lg shadow-sm p-3 mb-2">
                <div className="flex justify-between items-start">
                  <div>
                    <div className="text-sm font-medium">{entry.action_type}</div>
                    <div className="text-xs text-gray-400">
                      {entry.entity_id || 'new'} &middot; Class {entry.mutation_class}
                    </div>
                  </div>
                  <span className={`text-xs font-semibold sync-${entry.sync_status}`}>
                    {entry.sync_status}
                  </span>
                </div>
                {entry.last_error && (
                  <div className="text-xs text-red-500 mt-1">{entry.last_error}</div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ===== MAIN APP =====
    function App() {
      const [screen, setScreen] = useState('queue');
      const [selectedApparatus, setSelectedApparatus] = useState(null);
      const [data, setData] = useState(getSeedData);

      function handleStatusChange(appId, newStatus) {
        setData(prev => ({
          ...prev,
          apparatus: prev.apparatus.map(a =>
            a.id === appId ? { ...a, status: newStatus } : a
          ),
        }));
        if (selectedApparatus?.id === appId) {
          setSelectedApparatus(prev => ({ ...prev, status: newStatus }));
        }
      }

      function handleChecklistToggle(itemId, completed) {
        setData(prev => {
          const newChecklist = { ...prev.checklist };
          for (const appId in newChecklist) {
            newChecklist[appId] = newChecklist[appId].map(item =>
              item.id === itemId ? { ...item, completed } : item
            );
          }
          return { ...prev, checklist: newChecklist };
        });
      }

      function navigateToSub(sub, apparatus) {
        setSelectedApparatus(apparatus);
        setScreen(sub);
      }

      function renderScreen() {
        switch (screen) {
          case 'queue':
            return (
              <AssignmentQueue
                apparatus={data.apparatus}
                onSelect={a => { setSelectedApparatus(a); setScreen('detail'); }}
              />
            );
          case 'detail':
            return selectedApparatus ? (
              <ApparatusDetail
                apparatus={selectedApparatus}
                onBack={() => setScreen('queue')}
                onNavigate={navigateToSub}
                onStatusChange={handleStatusChange}
              />
            ) : null;
          case 'checklist':
            return selectedApparatus ? (
              <TestChecklist
                apparatus={selectedApparatus}
                checklistItems={data.checklist[selectedApparatus.id] || []}
                onBack={() => setScreen('detail')}
                onItemToggle={handleChecklistToggle}
              />
            ) : null;
          case 'issues':
            return selectedApparatus ? (
              <IssueReporter
                apparatus={selectedApparatus}
                onBack={() => setScreen('detail')}
              />
            ) : null;
          case 'hours':
            return selectedApparatus ? (
              <HoursEntry
                apparatus={selectedApparatus}
                onBack={() => setScreen('detail')}
              />
            ) : null;
          case 'sync':
            return <SyncStatus />;
          default:
            return null;
        }
      }

      const tabs = [
        { id: 'queue', label: 'Queue', icon: '📋' },
        { id: 'sync', label: 'Sync', icon: '🔄' },
      ];

      return (
        <div className="max-w-md mx-auto bg-gray-100 min-h-screen pb-16">
          {/* Header */}
          <div className="resa-bg text-white px-4 py-3 flex justify-between items-center">
            <div>
              <div className="text-sm font-bold">APEX Field</div>
              <div className="text-xs opacity-75">Stack Data Center</div>
            </div>
            <div className="text-xs opacity-75">tech-001</div>
          </div>

          {/* Screen content */}
          {renderScreen()}

          {/* Bottom tab bar */}
          <div className="tab-bar bg-white border-t flex">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => setScreen(tab.id)}
                className={`flex-1 py-3 text-center ${screen === tab.id ? 'resa-blue font-semibold' : 'text-gray-400'}`}
              >
                <div className="text-lg">{tab.icon}</div>
                <div className="text-xs">{tab.label}</div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
