<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APEX Cross-Surface Integration Test Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  .resa-blue { color: #015687; }
  .bg-resa-blue { background-color: #015687; }
  .resa-green { color: #5FA844; }
  .bg-resa-green { background-color: #5FA844; }
  .resa-gray { color: #686866; }
  .log-pass { color: #16a34a; }
  .log-fail { color: #dc2626; }
  .log-info { color: #2563eb; }
  .log-warn { color: #d97706; }
  pre.log-area { font-size: 11px; line-height: 1.5; max-height: 600px; overflow-y: auto; background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 6px; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const SEAM_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:8000/api/v1'
  : `${window.location.origin}/api/v1`;

function makeToken(actorId, role) {
  return btoa(JSON.stringify({ actor_id: actorId, actor_role: role, project_scope: ['proj-001'] }));
}

const TOKENS = {
  field_tech: makeToken('tech-001', 'field_tech'),
  lead: makeToken('lead-001', 'lead'),
  pm: makeToken('pm-001', 'pm'),
};

async function seamPost(token, endpoint, body) {
  const res = await fetch(`${SEAM_BASE}/mutations/${endpoint}`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, client_timestamp: new Date().toISOString() }),
  });
  return res.json();
}

async function seamGet(token, path) {
  const res = await fetch(`${SEAM_BASE}/reads/${path}`, {
    headers: { 'Authorization': `Bearer ${token}` },
  });
  return res.json();
}

const SCENARIOS = [
  {
    id: 'chain-field-lead-pm-approve',
    name: 'Full Chain: Field Capture → Lead Submit → PM Approve',
    category: 'Cross-Surface Chain',
    steps: [
      { desc: 'Field tech updates apparatus status (not_started → active)', fn: async (log) => {
        const r = await seamPost(TOKENS.field_tech, 'apparatus', {
          entity_id: 'app-001', action_type: 'update_status', mutation_class: 'B',
          idempotency_key: `int-field-status-${Date.now()}`, source: 'online',
          payload: { status: 'active' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Apparatus update: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Field tech completes checklist item', fn: async (log) => {
        const r = await seamPost(TOKENS.field_tech, 'checklist', {
          entity_id: 'item-001', action_type: 'complete_item', mutation_class: 'A',
          idempotency_key: `int-checklist-${Date.now()}`, source: 'online',
          payload: { completed: true }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Checklist complete: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Field tech logs hours', fn: async (log) => {
        const r = await seamPost(TOKENS.field_tech, 'hours', {
          action_type: 'log_entry', mutation_class: 'A',
          idempotency_key: `int-hours-${Date.now()}`, source: 'online',
          payload: { apparatus_id: 'app-001', task_id: 'task-001', project_id: 'proj-001', hours: 4.5, date: '2026-04-16', note: 'Integration test' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Hours logged: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Lead sees field-captured data via reads', fn: async (log) => {
        const apparatus = await seamGet(TOKENS.lead, 'apparatus/app-001');
        const hours = await seamGet(TOKENS.lead, 'hours');
        const hasStatus = apparatus.status === 'active';
        const hasHours = hours.length > 0;
        log(hasStatus && hasHours ? 'pass' : 'fail', `Lead reads: apparatus=${apparatus.status}, hours=${hours.length} entries`);
        return hasStatus && hasHours;
      }},
      { desc: 'Lead starts task-001 (not_started → active)', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'tasks', {
          entity_id: 'task-001', action_type: 'start', mutation_class: 'B',
          idempotency_key: `int-lead-start-${Date.now()}`, source: 'online',
          payload: { status: 'active' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Lead starts task: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Lead submits task-001 for PM review (active → awaiting_review)', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'tasks', {
          entity_id: 'task-001', action_type: 'submit_for_review', mutation_class: 'C',
          idempotency_key: `int-lead-submit-${Date.now()}`, source: 'online',
          payload: { status: 'awaiting_review' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Lead submits for review: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'PM sees task in approval queue', fn: async (log) => {
        const q = await seamGet(TOKENS.pm, 'approval-queue');
        const found = q.tasks && q.tasks.some(t => t.id === 'task-001');
        log(found ? 'pass' : 'fail', `PM queue: ${q.total_count} items, task-001 ${found ? 'found' : 'NOT found'}`);
        return found;
      }},
      { desc: 'PM approve blocked by issue-002 (blocking gate)', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'tasks', {
          entity_id: 'task-001', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-pm-blocked-${Date.now()}`, source: 'online',
          payload: { status: 'complete' }
        });
        const blocked = r.status === 'rejected' && r.error?.code === 'PRECONDITION_FAILED';
        log(blocked ? 'pass' : 'fail', `Blocking gate: ${r.error?.code || r.status}`);
        return blocked;
      }},
      { desc: 'Lead resolves blocking issue (open → in_review → resolved)', fn: async (log) => {
        const r1 = await seamPost(TOKENS.lead, 'issues', {
          entity_id: 'issue-002', action_type: 'begin_review', mutation_class: 'B',
          idempotency_key: `int-lead-rev-${Date.now()}`, source: 'online',
          payload: { status: 'in_review' }
        });
        const r2 = await seamPost(TOKENS.lead, 'issues', {
          entity_id: 'issue-002', action_type: 'resolve', mutation_class: 'B',
          idempotency_key: `int-lead-resolve-${Date.now()}`, source: 'online',
          payload: { status: 'resolved' }
        });
        const ok = r1.status === 'accepted' && r2.status === 'accepted';
        log(ok ? 'pass' : 'fail', `Issue resolution: review=${r1.status}, resolve=${r2.status}`);
        return ok;
      }},
      { desc: 'PM approves task-001 (blocking cleared)', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'tasks', {
          entity_id: 'task-001', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-pm-approve-${Date.now()}`, source: 'online',
          payload: { status: 'complete' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `PM approve after resolution: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Decision history records the approval', fn: async (log) => {
        const h = await seamGet(TOKENS.pm, 'decision-history');
        const hasApprove = h.some(e => e.action_type === 'approve' && e.entity_id === 'task-001');
        log(hasApprove ? 'pass' : 'fail', `Decision history: ${h.length} entries, approve=${hasApprove}`);
        return hasApprove;
      }},
    ],
  },
  {
    id: 'chain-escalation',
    name: 'Escalation Chain: Field Report → Lead Escalate → PM Resolve',
    category: 'Cross-Surface Chain',
    steps: [
      { desc: 'Lead escalates issue-001 to PM', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'issues', {
          entity_id: 'issue-001', action_type: 'escalate_to_pm', mutation_class: 'C',
          idempotency_key: `int-esc-${Date.now()}`, source: 'online',
          payload: { status: 'escalated' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Lead escalates: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'PM sees escalated issue in queue', fn: async (log) => {
        const q = await seamGet(TOKENS.pm, 'approval-queue');
        const found = q.escalated_issues && q.escalated_issues.some(i => i.id === 'issue-001');
        log(found ? 'pass' : 'fail', `Escalation queue: issue-001 ${found ? 'found' : 'NOT found'}`);
        return found;
      }},
      { desc: 'PM resolves escalated issue', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'issues', {
          entity_id: 'issue-001', action_type: 'resolve_escalated', mutation_class: 'C',
          idempotency_key: `int-pm-resolve-esc-${Date.now()}`, source: 'online',
          payload: { status: 'resolved' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `PM resolves escalated: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Lead sees resolved status', fn: async (log) => {
        const issues = await seamGet(TOKENS.lead, 'issues');
        const issue = issues.find(i => i.id === 'issue-001');
        const resolved = issue && issue.status === 'resolved';
        log(resolved ? 'pass' : 'fail', `Lead reads issue-001: status=${issue?.status}`);
        return resolved;
      }},
    ],
  },
  {
    id: 'chain-wp-reject-cycle',
    name: 'Reject Cycle: Lead Submit WP → PM Reject → Lead Resubmit → PM Approve',
    category: 'Cross-Surface Chain',
    steps: [
      { desc: 'Lead submits wp-002 for review', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'workpackages', {
          entity_id: 'wp-002', action_type: 'submit_for_review', mutation_class: 'C',
          idempotency_key: `int-wp-submit-${Date.now()}`, source: 'online',
          payload: { status: 'awaiting_review' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Lead submits wp-002: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'PM rejects wp-002', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'workpackages', {
          entity_id: 'wp-002', action_type: 'reject', mutation_class: 'C',
          idempotency_key: `int-wp-reject-${Date.now()}`, source: 'online',
          payload: { status: 'rejected' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `PM rejects wp-002: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Lead sees rejected state and restarts', fn: async (log) => {
        const wps = await seamGet(TOKENS.lead, 'workpackages');
        const wp = wps.find(w => w.id === 'wp-002');
        log(wp?.status === 'rejected' ? 'pass' : 'fail', `wp-002 status: ${wp?.status}`);
        return wp?.status === 'rejected';
      }},
      { desc: 'Lead moves wp-002 back to active', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'workpackages', {
          entity_id: 'wp-002', action_type: 'submit_for_review', mutation_class: 'C',
          idempotency_key: `int-wp-reactivate-${Date.now()}`, source: 'online',
          payload: { status: 'active' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Lead reactivates wp-002: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Lead resubmits wp-002', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'workpackages', {
          entity_id: 'wp-002', action_type: 'submit_for_review', mutation_class: 'C',
          idempotency_key: `int-wp-resubmit-${Date.now()}`, source: 'online',
          payload: { status: 'awaiting_review' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Lead resubmits wp-002: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'PM approves wp-002', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'workpackages', {
          entity_id: 'wp-002', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-wp-approve-${Date.now()}`, source: 'online',
          payload: { status: 'complete' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `PM approves wp-002: ${r.status}`);
        return r.status === 'accepted';
      }},
    ],
  },
  {
    id: 'chain-snapshot',
    name: 'Snapshot Review: PM Approve + Reject',
    category: 'Cross-Surface Chain',
    steps: [
      { desc: 'PM approves snap-001 (submitted → approved)', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'snapshots', {
          entity_id: 'snap-001', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-snap-approve-${Date.now()}`, source: 'online',
          payload: { status: 'approved' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Snapshot approve: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'PM cannot re-approve (already approved, no transitions out)', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'snapshots', {
          entity_id: 'snap-001', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-snap-re-approve-${Date.now()}`, source: 'online',
          payload: { status: 'approved' }
        });
        const blocked = r.status === 'rejected';
        log(blocked ? 'pass' : 'fail', `Re-approve blocked: ${r.error?.code || r.status}`);
        return blocked;
      }},
    ],
  },
  {
    id: 'authority-enforcement',
    name: 'Authority Boundary Enforcement',
    category: 'Authority Gates',
    steps: [
      { desc: 'Field tech cannot approve tasks', fn: async (log) => {
        const r = await seamPost(TOKENS.field_tech, 'tasks', {
          entity_id: 'task-003', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-auth-tech-${Date.now()}`, source: 'online',
          payload: { status: 'complete' }
        });
        const denied = r.error?.code === 'UNAUTHORIZED_ROLE';
        log(denied ? 'pass' : 'fail', `Tech approve denied: ${r.error?.code || r.status}`);
        return denied;
      }},
      { desc: 'Lead cannot approve tasks', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'tasks', {
          entity_id: 'task-003', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-auth-lead-${Date.now()}`, source: 'online',
          payload: { status: 'complete' }
        });
        const denied = r.error?.code === 'UNAUTHORIZED_ROLE';
        log(denied ? 'pass' : 'fail', `Lead approve denied: ${r.error?.code || r.status}`);
        return denied;
      }},
      { desc: 'Field tech cannot escalate issues', fn: async (log) => {
        const r = await seamPost(TOKENS.field_tech, 'issues', {
          entity_id: 'issue-001', action_type: 'escalate_to_pm', mutation_class: 'C',
          idempotency_key: `int-auth-tech-esc-${Date.now()}`, source: 'online',
          payload: { status: 'escalated' }
        });
        const denied = r.error?.code === 'UNAUTHORIZED_ROLE';
        log(denied ? 'pass' : 'fail', `Tech escalate denied: ${r.error?.code || r.status}`);
        return denied;
      }},
      { desc: 'PM cannot capture field data (update apparatus status)', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'apparatus', {
          entity_id: 'app-005', action_type: 'update_assessment', mutation_class: 'B',
          idempotency_key: `int-auth-pm-field-${Date.now()}`, source: 'online',
          payload: { assessment: 'test' }
        });
        const denied = r.error?.code === 'UNAUTHORIZED_ROLE';
        log(denied ? 'pass' : 'fail', `PM field capture denied: ${r.error?.code || r.status}`);
        return denied;
      }},
    ],
  },
  {
    id: 'offline-rejection',
    name: 'Class C Offline Rejection',
    category: 'Offline Rules',
    steps: [
      { desc: 'Offline Class C mutation rejected (PM approve)', fn: async (log) => {
        const r = await seamPost(TOKENS.pm, 'tasks', {
          entity_id: 'task-003', action_type: 'approve', mutation_class: 'C',
          idempotency_key: `int-offline-pm-${Date.now()}`, source: 'offline_queue',
          payload: { status: 'complete' }
        });
        const rejected = r.error?.code === 'OFFLINE_CLASS_C_REJECTED';
        log(rejected ? 'pass' : 'fail', `Offline Class C: ${r.error?.code || r.status}`);
        return rejected;
      }},
      { desc: 'Offline Class C mutation rejected (Lead submit)', fn: async (log) => {
        const r = await seamPost(TOKENS.lead, 'tasks', {
          entity_id: 'task-003', action_type: 'submit_for_review', mutation_class: 'C',
          idempotency_key: `int-offline-lead-${Date.now()}`, source: 'offline_queue',
          payload: { status: 'awaiting_review' }
        });
        const rejected = r.error?.code === 'OFFLINE_CLASS_C_REJECTED';
        log(rejected ? 'pass' : 'fail', `Offline Class C lead: ${r.error?.code || r.status}`);
        return rejected;
      }},
      { desc: 'Offline Class A/B accepted (field checklist)', fn: async (log) => {
        const r = await seamPost(TOKENS.field_tech, 'checklist', {
          entity_id: 'item-003', action_type: 'complete_item', mutation_class: 'A',
          idempotency_key: `int-offline-ok-${Date.now()}`, source: 'offline_queue',
          payload: { completed: true }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Offline Class A: ${r.status}`);
        return r.status === 'accepted';
      }},
    ],
  },
  {
    id: 'idempotency',
    name: 'Idempotency Enforcement',
    category: 'Idempotency',
    steps: [
      { desc: 'First mutation accepted', fn: async (log, ctx) => {
        ctx.idemp_key = `int-idemp-${Date.now()}`;
        const r = await seamPost(TOKENS.field_tech, 'checklist', {
          entity_id: 'item-005', action_type: 'complete_item', mutation_class: 'A',
          idempotency_key: ctx.idemp_key, source: 'online',
          payload: { completed: true }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `First call: ${r.status}`);
        return r.status === 'accepted';
      }},
      { desc: 'Replay with same key returns idempotent_hit', fn: async (log, ctx) => {
        const r = await seamPost(TOKENS.field_tech, 'checklist', {
          entity_id: 'item-005', action_type: 'complete_item', mutation_class: 'A',
          idempotency_key: ctx.idemp_key, source: 'online',
          payload: { completed: true }
        });
        log(r.status === 'idempotent_hit' ? 'pass' : 'fail', `Replay: ${r.status}`);
        return r.status === 'idempotent_hit';
      }},
    ],
  },
  {
    id: 'transition-guards',
    name: 'Lifecycle Transition Guards',
    category: 'Transition Rules',
    steps: [
      { desc: 'Invalid apparatus transition rejected (complete → active)', fn: async (log) => {
        await seamPost(TOKENS.field_tech, 'apparatus', {
          entity_id: 'app-003', action_type: 'update_status', mutation_class: 'B',
          idempotency_key: `int-trans-complete-${Date.now()}`, source: 'online',
          payload: { status: 'complete' }
        });
        const r = await seamPost(TOKENS.field_tech, 'apparatus', {
          entity_id: 'app-003', action_type: 'update_status', mutation_class: 'B',
          idempotency_key: `int-trans-invalid-${Date.now()}`, source: 'online',
          payload: { status: 'active' }
        });
        const rejected = r.error?.code === 'TRANSITION_INVALID';
        log(rejected ? 'pass' : 'fail', `Invalid transition: ${r.error?.code || r.status}`);
        return rejected;
      }},
      { desc: 'Valid apparatus transition accepted (not_started → ready)', fn: async (log) => {
        const r = await seamPost(TOKENS.field_tech, 'apparatus', {
          entity_id: 'app-004', action_type: 'update_status', mutation_class: 'B',
          idempotency_key: `int-trans-valid-${Date.now()}`, source: 'online',
          payload: { status: 'ready' }
        });
        log(r.status === 'accepted' ? 'pass' : 'fail', `Valid transition: ${r.status}`);
        return r.status === 'accepted';
      }},
    ],
  },
];

function App() {
  const [logs, setLogs] = useState([]);
  const [running, setRunning] = useState(false);
  const [results, setResults] = useState({});
  const [serverUp, setServerUp] = useState(null);
  const [storeState, setStoreState] = useState(null);
  const logRef = useRef(null);

  const addLog = useCallback((level, msg) => {
    setLogs(prev => [...prev, { level, msg, ts: new Date().toISOString().slice(11, 23) }]);
  }, []);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs]);

  const checkServer = useCallback(async () => {
    try {
      const res = await fetch(SEAM_BASE.replace('/api/v1', '/health'));
      const data = await res.json();
      setServerUp(data.status === 'healthy');
    } catch {
      setServerUp(false);
    }
  }, []);

  const refreshState = useCallback(async () => {
    try {
      const [apparatus, tasks, wps, issues, snapshots, queue] = await Promise.all([
        seamGet(TOKENS.pm, 'apparatus'),
        seamGet(TOKENS.pm, 'tasks'),
        seamGet(TOKENS.pm, 'workpackages'),
        seamGet(TOKENS.pm, 'issues'),
        seamGet(TOKENS.pm, 'snapshots'),
        seamGet(TOKENS.pm, 'approval-queue'),
      ]);
      setStoreState({ apparatus, tasks, wps, issues, snapshots, queue });
    } catch (e) {
      addLog('warn', `State refresh failed: ${e.message}`);
    }
  }, [addLog]);

  useEffect(() => { checkServer(); }, [checkServer]);

  const resetAndRun = useCallback(async () => {
    try {
      const res = await fetch(SEAM_BASE.replace('/api/v1', '/health'));
      if (!res.ok) throw new Error('Server not reachable');
    } catch {
      addLog('fail', 'Server not reachable. Start the mutation seam first.');
      return;
    }
    setRunning(true);
    setLogs([]);
    setResults({});
    addLog('info', '═══ Resetting store to seed state ═══');

    let totalPass = 0, totalFail = 0, totalSteps = 0;

    for (const scenario of SCENARIOS) {
      addLog('info', `\n─── ${scenario.name} ───`);
      let scenarioPass = 0, scenarioFail = 0;
      const ctx = {};

      for (const step of scenario.steps) {
        totalSteps++;
        try {
          const ok = await step.fn((level, msg) => addLog(level, `  ${msg}`), ctx);
          if (ok) { scenarioPass++; totalPass++; }
          else { scenarioFail++; totalFail++; }
        } catch (e) {
          scenarioFail++;
          totalFail++;
          addLog('fail', `  ERROR: ${e.message}`);
        }
      }

      const status = scenarioFail === 0 ? 'pass' : 'fail';
      setResults(prev => ({ ...prev, [scenario.id]: { pass: scenarioPass, fail: scenarioFail, status } }));
      addLog(status, `  Result: ${scenarioPass}/${scenarioPass + scenarioFail} passed`);
    }

    addLog('info', `\n═══════════════════════════════════════`);
    addLog(totalFail === 0 ? 'pass' : 'fail', `TOTAL: ${totalPass}/${totalSteps} passed, ${totalFail} failed`);
    addLog('info', '═══════════════════════════════════════');

    await refreshState();
    setRunning(false);
  }, [addLog, refreshState]);

  const categories = [...new Set(SCENARIOS.map(s => s.category))];

  return (
    <div className="max-w-7xl mx-auto p-4">
      <div className="bg-resa-blue text-white p-4 rounded-t-lg flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold">APEX Cross-Surface Integration Test Dashboard</h1>
          <p className="text-sm opacity-80">UI-001d — Field → Lead → PM chain validation harness</p>
        </div>
        <div className="flex items-center gap-4">
          <div className="flex items-center gap-2">
            <div className={`w-3 h-3 rounded-full ${serverUp === true ? 'bg-green-400' : serverUp === false ? 'bg-red-400' : 'bg-yellow-400'}`}></div>
            <span className="text-sm">{serverUp === true ? 'Seam Online' : serverUp === false ? 'Seam Offline' : 'Checking...'}</span>
          </div>
          <button onClick={checkServer} className="text-xs bg-white/20 px-2 py-1 rounded hover:bg-white/30">Refresh</button>
        </div>
      </div>

      <div className="bg-white border-x border-b p-4 flex items-center gap-4">
        <button
          onClick={resetAndRun}
          disabled={running || !serverUp}
          className={`px-6 py-2 rounded font-semibold text-white ${running || !serverUp ? 'bg-gray-400 cursor-not-allowed' : 'bg-resa-green hover:opacity-90'}`}
        >
          {running ? 'Running...' : 'Run All Scenarios'}
        </button>
        <button
          onClick={refreshState}
          disabled={!serverUp}
          className="px-4 py-2 rounded border text-sm hover:bg-gray-50"
        >
          Refresh Store State
        </button>
        <span className="text-sm text-gray-500">
          {Object.keys(results).length > 0 && (() => {
            const p = Object.values(results).reduce((a, r) => a + r.pass, 0);
            const f = Object.values(results).reduce((a, r) => a + r.fail, 0);
            return `${p}/${p + f} steps passed across ${Object.keys(results).length} scenarios`;
          })()}
        </span>
      </div>

      <div className="grid grid-cols-3 gap-4 mt-4">
        <div className="col-span-1">
          <div className="bg-white rounded-lg shadow p-4">
            <h2 className="font-bold text-sm mb-3 resa-blue">Scenarios</h2>
            {categories.map(cat => (
              <div key={cat} className="mb-3">
                <h3 className="text-xs font-semibold text-gray-500 uppercase mb-1">{cat}</h3>
                {SCENARIOS.filter(s => s.category === cat).map(s => {
                  const r = results[s.id];
                  return (
                    <div key={s.id} className="flex items-center gap-2 py-1 text-sm">
                      {r ? (
                        <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs text-white ${r.status === 'pass' ? 'bg-green-500' : 'bg-red-500'}`}>
                          {r.status === 'pass' ? '✓' : '✗'}
                        </span>
                      ) : (
                        <span className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-xs text-gray-400">–</span>
                      )}
                      <span className="flex-1">{s.name}</span>
                      {r && <span className="text-xs text-gray-400">{r.pass}/{r.pass + r.fail}</span>}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          {storeState && (
            <div className="bg-white rounded-lg shadow p-4 mt-4">
              <h2 className="font-bold text-sm mb-3 resa-blue">Current Store State</h2>
              <div className="space-y-2 text-xs">
                <div className="flex justify-between"><span>Apparatus</span><span className="font-mono">{storeState.apparatus.length}</span></div>
                <div className="flex justify-between"><span>Tasks</span><span className="font-mono">{storeState.tasks.length}</span></div>
                <div className="flex justify-between"><span>WorkPackages</span><span className="font-mono">{storeState.wps.length}</span></div>
                <div className="flex justify-between"><span>Issues</span><span className="font-mono">{storeState.issues.length}</span></div>
                <div className="flex justify-between"><span>Snapshots</span><span className="font-mono">{storeState.snapshots.length}</span></div>
                <hr/>
                <div className="flex justify-between font-semibold"><span>Approval Queue</span><span className="font-mono">{storeState.queue.total_count}</span></div>
                {storeState.tasks.map(t => (
                  <div key={t.id} className="flex justify-between text-gray-500 pl-2">
                    <span>{t.id}: {t.name}</span>
                    <span className={`font-mono ${t.status === 'complete' ? 'text-green-600' : t.status === 'rejected' ? 'text-red-600' : t.status === 'awaiting_review' ? 'text-yellow-600' : ''}`}>{t.status}</span>
                  </div>
                ))}
                {storeState.wps.map(w => (
                  <div key={w.id} className="flex justify-between text-gray-500 pl-2">
                    <span>{w.id}: {w.name}</span>
                    <span className={`font-mono ${w.status === 'complete' ? 'text-green-600' : w.status === 'rejected' ? 'text-red-600' : ''}`}>{w.status}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="col-span-2">
          <div className="bg-white rounded-lg shadow p-4">
            <h2 className="font-bold text-sm mb-3 resa-blue">Execution Log</h2>
            <pre className="log-area" ref={logRef}>
              {logs.length === 0 ? (
                <span className="text-gray-500">Click "Run All Scenarios" to start the cross-surface validation harness.\nThe seam must be running on localhost:8000.</span>
              ) : logs.map((l, i) => (
                <div key={i}>
                  <span className="text-gray-500">[{l.ts}] </span>
                  <span className={`log-${l.level}`}>{l.msg}</span>
                </div>
              ))}
            </pre>
          </div>
        </div>
      </div>

      <div className="text-center text-xs text-gray-400 mt-6 pb-4">
        APEX Platform — Cross-Surface Integration Test Dashboard — UI-001d
        <br/>Scenarios: {SCENARIOS.length} | Steps: {SCENARIOS.reduce((a, s) => a + s.steps.length, 0)} | Surfaces: Field + Lead + PM
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
