<body>
  <div id="root"></div>
  <script src="schedule.js?v=f8" type="text/babel"></script>
  <script src="variance.js?v=f8" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8000/api/v1'
      : `${window.location.origin}/api/v1`;
    const SEAM_BASE = API_BASE + '/mutations';
    const READS_BASE = API_BASE + '/reads';
    const PM_ACTOR = { actor_id: 'pm-001', actor_role: 'pm', project_scope: ['proj-001'] };

    function makeToken(actor) { return 'Bearer ' + btoa(JSON.stringify(actor)); }

    async function seamPost(endpoint, actionType, mutationClass, entityId, payload, reason) {
      const body = {
        idempotency_key: crypto.randomUUID(), mutation_class: mutationClass,
        action_type: actionType, entity_id: entityId, payload: payload,
        reason: reason || '', source: 'online', client_timestamp: new Date().toISOString(),
      };
      const resp = await fetch(`${SEAM_BASE}/${endpoint}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': makeToken(PM_ACTOR) },
        body: JSON.stringify(body),
      });
      return resp.json();
    }

    async function readData(endpoint) {
      const resp = await fetch(`${READS_BASE}/${endpoint}`, { headers: { 'Authorization': makeToken(PM_ACTOR) } });
      return resp.json();
    }

    function useProjectData() {
      const [queue, setQueue] = useState({ tasks: [], workpackages: [], snapshots: [], escalated_issues: [], total_count: 0 });
      const [history, setHistory] = useState([]);
      const [apparatus, setApparatus] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [workpackages, setWorkpackages] = useState([]);
      const [issues, setIssues] = useState([]);
      const [assignments, setAssignments] = useState([]);
      const [loading, setLoading] = useState(true);
      const [online, setOnline] = useState(true);
      const [lastRefresh, setLastRefresh] = useState(null);

      const refresh = useCallback(async () => {
        try {
          setLoading(true);
          const [q, h, app, tsk, wp, iss, asgn] = await Promise.all([
            readData('approval-queue'), readData('decision-history'),
            readData('apparatus'), readData('tasks'), readData('workpackages'),
            readData('issues'), readData('assignments'),
          ]);
          setQueue(q); setHistory(h); setApparatus(app); setTasks(tsk);
          setWorkpackages(wp); setIssues(iss); setAssignments(asgn);
          setOnline(true); setLastRefresh(new Date());
        } catch (e) { setOnline(false); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { refresh(); const id = setInterval(refresh, 15000); return () => clearInterval(id); }, [refresh]);
      return { queue, history, apparatus, tasks, workpackages, issues, assignments, loading, online, refresh, lastRefresh };
    }

    function StatusBadge({ status }) {
      return React.createElement('span', { className: `badge status-${status}` }, status?.replace(/_/g, ' '));
    }
    function TypeBadge({ type }) {
      return React.createElement('span', { className: `badge type-badge-${type}` }, type);
    }
    function SeverityLabel({ severity }) {
      return React.createElement('span', { className: `severity-${severity}` }, severity);
    }

      const { queue } = data;
      const allItems = [
        ...queue.workpackages.map(w => ({ ...w, _type: 'workpackage', _name: w.name })),
        ...queue.tasks.map(t => ({ ...t, _type: 'task', _name: t.name })),

        React.createElement('h1', { className: 'text-xl font-bold resa-blue mb-1' }, 'Approval Queue'),
        React.createElement('p', { className: 'text-sm text-gray-500 mb-4' }, `${queue.total_count} items awaiting review`),

        allItems.length === 0

              React.createElement('table', null,
                React.createElement('thead', null, React.createElement('tr', null,
                  React.createElement('th', null, 'Type'),
                  React.createElement('th', null, 'Name'),

                        React.createElement('button', { className: 'btn btn-outline', style: { fontSize: 11, padding: '3px 8px' } }, 'Review →')
                      ),
                    )
                  )
                ),
              ),
            ),

              ),
            )
          ),
        ),
      );
    }

    function WorkPackageReview({ wpId, data, navigate, onMutate }) {
      const { workpackages, tasks, apparatus, issues, assignments } = data;
      const wp = workpackages.find(w => w.id === wpId);
      if (!wp) return React.createElement('div', { className: 'card' }, 'WorkPackage not found');

      const [reason, setReason] = useState('');
      const [result, setResult] = useState(null);

      const wpTasks = tasks.filter(t => t.workpackage_id === wpId);
      const wpApparatus = apparatus.filter(a => wpTasks.some(t => t.id === a.task_id));
      const wpIssues = issues.filter(i => wpApparatus.some(a => a.id === i.apparatus_id));
      const blocking = wpIssues.filter(i => i.blocks_completion && i.status !== 'resolved' && i.status !== 'closed');
      const completeTasks = wpTasks.filter(t => t.status === 'complete').length;
      const completeApparatus = wpApparatus.filter(a => a.status === 'complete').length;
      const canApprove = wp.status === 'awaiting_review' && blocking.length === 0;

      const doAction = async (action, payload) => {
        if (!reason.trim()) { alert('Reason/note required'); return; }
        const r = await seamPost('workpackages', action, 'C', wpId, payload, reason);
        setResult(r);
        if (r.status === 'accepted') { setTimeout(() => { onMutate(); navigate('queue'); }, 800); }
      };

      return React.createElement('div', null,
        React.createElement('button', { className: 'text-sm resa-blue mb-3 cursor-pointer', onClick: () => navigate('queue') }, '← Back to Queue'),
        React.createElement('div', { className: 'flex items-center gap-3 mb-4' },
          React.createElement(TypeBadge, { type: 'workpackage' }),
          React.createElement('h1', { className: 'text-xl font-bold resa-blue' }, wp.name),
          React.createElement(StatusBadge, { status: wp.status }),
        ),
        React.createElement('div', { className: 'grid grid-cols-4 gap-3 mb-4' },
          React.createElement('div', { className: 'card text-center' },
            React.createElement('div', { className: 'text-2xl font-bold resa-blue' }, `${completeTasks}/${wpTasks.length}`),
            React.createElement('div', { className: 'text-xs text-gray-500' }, 'Tasks Complete'),
          ),
          React.createElement('div', { className: 'card text-center' },
            React.createElement('div', { className: 'text-2xl font-bold resa-blue' }, `${completeApparatus}/${wpApparatus.length}`),
            React.createElement('div', { className: 'text-xs text-gray-500' }, 'Apparatus Complete'),
          ),
          React.createElement('div', { className: 'card text-center' },
            React.createElement('div', { className: 'text-2xl font-bold', style: { color: blocking.length > 0 ? '#dc2626' : '#059669' } }, blocking.length),
            React.createElement('div', { className: 'text-xs text-gray-500' }, 'Blocking Issues'),
          ),
          React.createElement('div', { className: 'card text-center' },
            React.createElement('div', { className: 'text-2xl font-bold resa-blue' }, `${wpApparatus.length > 0 ? Math.round((completeApparatus/wpApparatus.length)*100) : 0}%`),
            React.createElement('div', { className: 'text-xs text-gray-500' }, 'Progress'),
          ),
        ),
        blocking.length > 0 && React.createElement('div', { className: 'blocker-warning' },
          React.createElement('h3', { className: 'text-sm font-bold text-red-700 mb-1' }, `⚠ ${blocking.length} Unresolved Blocking Issue(s) — Approval Disabled`),
          blocking.map(i => React.createElement('div', { key: i.id, className: 'text-sm py-1' },
            React.createElement(SeverityLabel, { severity: i.severity }), ' ', i.title,
          )),
          React.createElement('p', { className: 'text-xs text-red-500 mt-2' }, 'Blocking issues must be resolved before this WorkPackage can be approved. This is a server-enforced precondition.'),
        ),
        React.createElement('div', { className: 'card' },
          React.createElement('h3', { className: 'text-sm font-bold text-gray-700 mb-2' }, 'Tasks'),
          React.createElement('table', null,
            React.createElement('thead', null, React.createElement('tr', null,
              React.createElement('th', null, 'Task'), React.createElement('th', null, 'Status'),
              React.createElement('th', null, 'Apparatus'), React.createElement('th', null, 'Issues'),
            )),
            React.createElement('tbody', null, wpTasks.map(t => {
              const tApp = wpApparatus.filter(a => a.task_id === t.id);
              const tIss = wpIssues.filter(i => tApp.some(a => a.id === i.apparatus_id));
              return React.createElement('tr', { key: t.id },
                React.createElement('td', { className: 'font-medium' }, t.name),
                React.createElement('td', null, React.createElement(StatusBadge, { status: t.status })),
                React.createElement('td', { className: 'text-xs' }, `${tApp.filter(a=>a.status==='complete').length}/${tApp.length}`),
                React.createElement('td', null, tIss.length > 0 ? React.createElement('span', { className: 'text-red-500 text-xs font-bold' }, `${tIss.length}`) : '—'),
              );
            })),
          ),
        ),
        wpIssues.length > 0 && React.createElement('div', { className: 'card' },
          React.createElement('h3', { className: 'text-sm font-bold text-gray-700 mb-2' }, `Issues (${wpIssues.length})`),
          wpIssues.map(i => React.createElement('div', { key: i.id, className: 'flex justify-between py-1 border-b border-gray-100 text-sm' },
            React.createElement('span', null, i.title),
            React.createElement('div', { className: 'flex gap-2' },
              React.createElement(SeverityLabel, { severity: i.severity }),
              React.createElement(StatusBadge, { status: i.status }),
              i.blocks_completion && React.createElement('span', { className: 'badge bg-red-100 text-red-700' }, 'BLOCKING'),
            ),
          )),
        ),
        React.createElement('div', { className: 'card', style: { borderTop: '3px solid #015687' } },
          React.createElement('h3', { className: 'text-sm font-bold resa-blue mb-3' }, 'Decision'),
          React.createElement('textarea', { className: 'w-full border border-gray-300 rounded p-2 text-sm mb-3', rows: 3,
            placeholder: 'Decision reason/note (required)...', value: reason, onChange: e => setReason(e.target.value) }),
          React.createElement('p', { className: 'text-xs text-gray-400 mb-3' }, 'Class C server-authoritative — requires online connectivity.'),
          result && React.createElement('div', { className: `text-sm mb-3 p-2 rounded ${result.status === 'accepted' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}` },
            result.status === 'accepted' ? '✓ Decision recorded' : `✗ ${result.error?.message || JSON.stringify(result)}`),
          React.createElement('div', { className: 'flex gap-2' },
            React.createElement('button', { className: 'btn btn-approve', disabled: !canApprove,
              onClick: () => doAction('approve', { status: 'complete' }),
              title: !canApprove ? 'Blocked by unresolved issues' : '',
            }, canApprove ? 'Approve' : 'Approve (blocked)'),
            React.createElement('button', { className: 'btn btn-reject', onClick: () => doAction('reject', { status: 'active' }) }, 'Reject'),
            React.createElement('button', { className: 'btn btn-escalate', onClick: () => doAction('escalate_review', {}) }, 'Escalate'),
          ),
        ),
      );
    }

    function TaskReview({ taskId, data, navigate, onMutate }) {
      const { tasks, apparatus, issues, workpackages } = data;
      const task = tasks.find(t => t.id === taskId);
      if (!task) return React.createElement('div', { className: 'card' }, 'Task not found');

      const [reason, setReason] = useState('');
      const [result, setResult] = useState(null);

      const wp = workpackages.find(w => w.id === task.workpackage_id);
      const taskApparatus = apparatus.filter(a => a.task_id === taskId);
      const taskIssues = issues.filter(i => taskApparatus.some(a => a.id === i.apparatus_id));
      const blocking = taskIssues.filter(i => i.blocks_completion && i.status !== 'resolved' && i.status !== 'closed');
      const canApprove = task.status === 'awaiting_review' && blocking.length === 0;

      const doAction = async (action, payload) => {
        if (!reason.trim()) { alert('Reason/note required'); return; }
        const r = await seamPost('tasks', action, 'C', taskId, payload, reason);
        setResult(r);
        if (r.status === 'accepted') { setTimeout(() => { onMutate(); navigate('queue'); }, 800); }
      };

      return React.createElement('div', null,
        React.createElement('button', { className: 'text-sm resa-blue mb-3 cursor-pointer', onClick: () => navigate('queue') }, '← Back to Queue'),
        React.createElement('div', { className: 'flex items-center gap-3 mb-4' },
          React.createElement(TypeBadge, { type: 'task' }),
          React.createElement('h1', { className: 'text-xl font-bold resa-blue' }, task.name),
          React.createElement(StatusBadge, { status: task.status }),
        ),
        React.createElement('p', { className: 'text-sm text-gray-500 mb-4' }, `WorkPackage: ${wp?.name || task.workpackage_id}`),
        React.createElement('div', { className: 'grid grid-cols-3 gap-3 mb-4' },
          React.createElement('div', { className: 'card text-center' },
            React.createElement('div', { className: 'text-2xl font-bold resa-blue' }, `${taskApparatus.filter(a=>a.status==='complete').length}/${taskApparatus.length}`),
            React.createElement('div', { className: 'text-xs text-gray-500' }, 'Apparatus Complete'),
          ),
          React.createElement('div', { className: 'card text-center' },
            React.createElement('div', { className: 'text-2xl font-bold', style: { color: blocking.length > 0 ? '#dc2626' : '#059669' } }, blocking.length),
            React.createElement('div', { className: 'text-xs text-gray-500' }, 'Blocking Issues'),
          ),
          React.createElement('div', { className: 'card text-center' },
            React.createElement('div', { className: 'text-2xl font-bold resa-blue' }, taskIssues.length),
            React.createElement('div', { className: 'text-xs text-gray-500' }, 'Total Issues'),
          ),
        ),
        blocking.length > 0 && React.createElement('div', { className: 'blocker-warning' },
          React.createElement('h3', { className: 'text-sm font-bold text-red-700 mb-1' }, `⚠ ${blocking.length} Blocking Issue(s) — Approval Disabled`),
          blocking.map(i => React.createElement('div', { key: i.id, className: 'text-sm py-1' },
            React.createElement(SeverityLabel, { severity: i.severity }), ' ', i.title)),
        ),
        React.createElement('div', { className: 'card' },
          React.createElement('h3', { className: 'text-sm font-bold text-gray-700 mb-2' }, 'Apparatus'),
          taskApparatus.map(a => React.createElement('div', { key: a.id, className: 'flex justify-between py-1 border-b border-gray-100 text-sm' },
            React.createElement('span', { className: 'font-medium' }, a.name),
            React.createElement('div', { className: 'flex gap-2' },
              React.createElement('span', { className: 'text-xs text-gray-500' }, a.neta_standard),
              React.createElement(StatusBadge, { status: a.status }),
            ),
          )),
        ),
        React.createElement('div', { className: 'card', style: { borderTop: '3px solid #015687' } },

            result.status === 'accepted' ? '✓ Decision recorded' : `✗ ${result.error?.message || JSON.stringify(result)}`),
          React.createElement('div', { className: 'flex gap-2' },

    function SnapshotReview({ snapId, data, navigate, onMutate }) {
      const allSnaps = [...(data.queue.snapshots || [])];
      const [snapshots, setSnapshots] = useState([]);
      useEffect(() => { readData('snapshots').then(setSnapshots); }, []);
      const snap = snapshots.find(s => s.id === snapId) || allSnaps.find(s => s.id === snapId);

        React.createElement('button', { className: 'text-sm resa-blue mb-3 cursor-pointer', onClick: () => navigate('queue') }, '← Back to Queue'),
        React.createElement('div', { className: 'flex items-center gap-3 mb-4' },
          React.createElement(TypeBadge, { type: 'snapshot' }),
          React.createElement('h1', { className: 'text-xl font-bold resa-blue' }, 'Progress Snapshot'),
          React.createElement(StatusBadge, { status: snap.status }),
        ),
        React.createElement('div', { className: 'card' },
          React.createElement('div', { className: 'grid grid-cols-2 gap-4 text-sm' },
            React.createElement('div', null, React.createElement('span', { className: 'text-gray-500' }, 'WorkPackage: '), React.createElement('span', { className: 'font-medium' }, wp?.name || snap.workpackage_id)),
            React.createElement('div', null, React.createElement('span', { className: 'text-gray-500' }, 'Period: '), React.createElement('span', null, `${snap.period_start} — ${snap.period_end}`)),

    function EscalationQueue({ data, onMutate }) {
      const { issues, apparatus, tasks, workpackages } = data;
      const escalated = issues.filter(i => i.status === 'escalated');
      const [reason, setReason] = useState('');
      const [activeIssue, setActiveIssue] = useState(null);
      const [result, setResult] = useState(null);

      const doAction = async (issueId, action, payload) => {
        if (!reason.trim()) { alert('Reason required'); return; }
        const r = await seamPost('issues', action, 'C', issueId, payload, reason);

        if (r.status === 'accepted') { setActiveIssue(null); setReason(''); onMutate(); }

        React.createElement('h1', { className: 'text-xl font-bold resa-blue mb-4' }, 'Escalation Queue'),
        escalated.length === 0

              const app = apparatus.find(a => a.id === issue.apparatus_id);
              const task = app ? tasks.find(t => t.id === app.task_id) : null;
              const wp = task ? workpackages.find(w => w.id === task.workpackage_id) : null;
              const isActive = activeIssue === issue.id;

                      issue.blocks_completion && React.createElement('span', { className: 'badge bg-red-100 text-red-700' }, 'BLOCKING'),
                    ),
                  ),
                  !isActive && React.createElement('button', { className: 'btn btn-outline', onClick: () => setActiveIssue(issue.id) }, 'Take Action'),
                ),
                React.createElement('div', { className: 'text-xs text-gray-500 mb-2' },
                  `Apparatus: ${app?.name || issue.apparatus_id} • Task: ${task?.name || '—'} • WP: ${wp?.name || '—'} • Reporter: ${issue.reported_by}`

                isActive && React.createElement('div', { className: 'mt-3 pt-3 border-t border-gray-200' },
                  React.createElement('textarea', { className: 'w-full border border-gray-300 rounded p-2 text-sm mb-3', rows: 2,
                    placeholder: 'Disposition reason (required)...', value: reason, onChange: e => setReason(e.target.value) }),
                  result && result.id === issue.id && React.createElement('div', { className: `text-sm mb-2 p-2 rounded ${result.status === 'accepted' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}` },
                    result.status === 'accepted' ? '✓ Done' : `✗ ${result.error?.message || 'Failed'}`),

                    React.createElement('button', { className: 'btn btn-escalate', onClick: () => doAction(issue.id, 're_escalate', { status: 'escalated' }) }, 'Re-escalate'),
                    React.createElement('button', { className: 'btn btn-return', onClick: () => doAction(issue.id, 'return_to_lead', { status: 'in_review' }) }, 'Return to Lead'),
                    React.createElement('button', { className: 'btn btn-outline', onClick: () => { setActiveIssue(null); setReason(''); } }, 'Cancel'),
                  ),
                ),
              );
            }),
      );
    }

    function DecisionHistory({ data }) {
      const { history } = data;
      const [filterType, setFilterType] = useState('all');
      const [filterAction, setFilterAction] = useState('all');
      const [search, setSearch] = useState('');

      const filtered = history.filter(e => {
        if (filterType !== 'all' && e.entity_type !== filterType) return false;
        if (filterAction !== 'all' && e.action_type !== filterAction) return false;
        if (search && !JSON.stringify(e).toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      return React.createElement('div', null,
        React.createElement('h1', { className: 'text-xl font-bold resa-blue mb-4' }, 'Decision History'),
        React.createElement('div', { className: 'card flex gap-3 items-center mb-4' },
          React.createElement('select', { value: filterType, onChange: e => setFilterType(e.target.value) },
            React.createElement('option', { value: 'all' }, 'All Types'),

                      React.createElement('td', { className: 'text-xs' }, `${e.from_state?.status || '—'} → ${e.to_state?.status || '—'}`),

            ),
      );
    }

    function App() {
      const data = useProjectData();
      const [screen, setScreen] = useState('queue');

        setScreen('variance');

      const onViewSchedule = useCallback((taskId) => {

        setDetailId(null);

        setScreen('drivers');
        setDetailId(null);

          case 'task-review': return React.createElement(TaskReview, { taskId: detailId, data, navigate, onMutate: data.refresh });
          case 'snapshot-review': return React.createElement(SnapshotReview, { snapId: detailId, data, navigate, onMutate: data.refresh });
          case 'escalations': return React.createElement(EscalationQueue, { data, onMutate: data.refresh });
          case 'history': return React.createElement(DecisionHistory, { data });
          case 'schedule':
            return window.ApexSchedule && window.ApexSchedule.ScheduleView
              ? React.createElement(window.ApexSchedule.ScheduleView, {
                  onTraceTask, onViewVariance, onViewDrivers, focusTaskId,

          case 'drivers':
            return window.ApexDrivers && window.ApexDrivers.DriversReviewView
              ? React.createElement(window.ApexDrivers.DriversReviewView, {
                  onTraceTask, onViewVariance, onViewSchedule, focusTaskId,

                  'Drivers module not loaded. Reload the page; drivers.js must load alongside index.html.');
          case 'tracer':

                  'Tracer module not loaded. Reload the page; tracer.js must load alongside index.html.');
          case 'variance':
            return window.ApexVariance && window.ApexVariance.VarianceReviewView
              ? React.createElement(window.ApexVariance.VarianceReviewView, {
                  onTraceTask, onViewSchedule, onViewDrivers, focusTaskId,

              : React.createElement('div', { className: 'card' },
                  'Variance module not loaded. Reload the page; variance.js must load alongside index.html.');
          default: return React.createElement(ApprovalQueue, { data, navigate });
        }
      };

      return React.createElement('div', null,
        React.createElement('div', { className: 'sidebar' },
          React.createElement('div', { className: 'mb-6' },
            React.createElement('div', { className: 'font-bold text-lg resa-blue' }, 'APEX PM'),
            React.createElement('div', { className: 'text-xs resa-green font-semibold' }, 'Approval Surface'),
            React.createElement('div', { className: 'text-xs text-gray-400 mt-1' }, 'pm-001 • proj-001'),
            React.createElement('div', { className: 'text-xs mt-2' },
              React.createElement('span', { className: data.online ? 'online-indicator' : 'offline-indicator' }),
              data.online ? 'Online' : 'Offline — decisions disabled',

          navItems.map(item =>
            React.createElement('div', { key: item.key, className: `nav-item ${screen === item.key ? 'active' : ''}`, onClick: () => navigate(item.key) },

            React.createElement('div', { className: 'text-xs text-gray-500' }, data.lastRefresh?.toLocaleTimeString() || '—'),
            React.createElement('button', { className: 'btn btn-outline mt-2 w-full text-xs', onClick: data.refresh }, 'Refresh'),

        React.createElement('div', { className: 'main-content' },

            React.createElement('span', { className: 'offline-indicator' }),

          ),
