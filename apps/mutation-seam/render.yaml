services:
  - type: web
    name: apex-platform-mutation-seam
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://operations.apexpowerops.com,https://mutation-seam.apexpowerops.com
      - key: SEAM_STORE_BACKEND
        value: postgres
      - key: SEAM_DATABASE_URL
        sync: false